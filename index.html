<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

// =====================
// SUPABASE CONFIG
// =====================
const SUPABASE_URL = "https://fvotrwamgmmaabypskmy.supabase.co";
const SUPABASE_KEY = "sb_publishable_jlErcZIhBOaBGtTCz9T7Sg_ksKY97FU";

const sb = {
  headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY },
  url: (table, params) => SUPABASE_URL + "/rest/v1/" + table + (params ? "?" + params : ""),
  async get(table, params) {
    let all = [];
    let offset = 0;
    const pageSize = 1000;
    // Strip any existing limit/offset from params to avoid conflicts
    const cleanParams = (params||"").replace(/&?limit=\d+/g,"").replace(/&?offset=\d+/g,"").replace(/^\&/,"");
    while (true) {
      const sep = cleanParams ? "&" : "";
      const pageParams = `${cleanParams}${sep}limit=${pageSize}&offset=${offset}`;
      const r = await fetch(sb.url(table, pageParams), {
        headers: { ...sb.headers, "Prefer": "return=representation" }
      });
      if (!r.ok) break;
      const page = await r.json();
      if (!Array.isArray(page) || page.length === 0) break;
      all = all.concat(page);
      if (page.length < pageSize) break;
      offset += pageSize;
    }
    return all;
  },
  async post(table, data) {
    const r = await fetch(sb.url(table), { method: "POST", headers: { ...sb.headers, "Prefer": "return=representation" }, body: JSON.stringify(data) });
    return r.json();
  },
  async patch(table, id, data) {
    const r = await fetch(sb.url(table, "id=eq." + id), { method: "PATCH", headers: { ...sb.headers, "Prefer": "return=representation" }, body: JSON.stringify(data) });
    return r.json();
  },
  async delete(table, id) {
    await fetch(sb.url(table, "id=eq." + id), { method: "DELETE", headers: sb.headers });
  },
  async getByClient(table, clientId, extraParams) {
    const params = "client_id=eq." + clientId + (extraParams ? "&" + extraParams : "") + "&limit=5000";
    const r = await fetch(sb.url(table, params), {
      headers: { ...sb.headers, "Prefer": "return=representation" }
    });
    return r.json();
  }
};

// camelCase <-> snake_case converters
const toSnake = obj => {
  const m = { accountNumber:"account_number", renewalDate:"renewal_date", primaryWorkPhone:"primary_work_phone", billingLocation:"billing_location", contactName:"contact_name", phoneNumbers:"phone_numbers", clientId:"client_id", modelNumber:"model_number", serialNumber:"serial_number", partNumber:"part_number", subItemOf:"sub_item_of", startDate:"start_date", apcCaseNum:"apc_case_num", serviceCallNum:"service_call_num", maintenanceNum:"maintenance_num", customerPO:"customer_po", apcSalesOrder:"apc_sales_order", contractLocation:"contract_location", customFields:"custom_fields", deletedAt:"deleted_at" };
  const r = {};
  for (const k in obj) { r[m[k]||k] = obj[k]; }
  return r;
};
const toCamel = obj => {
  const m = { account_number:"accountNumber", renewal_date:"renewalDate", primary_work_phone:"primaryWorkPhone", billing_location:"billingLocation", contact_name:"contactName", phone_numbers:"phoneNumbers", client_id:"clientId", model_number:"modelNumber", serial_number:"serialNumber", part_number:"partNumber", sub_item_of:"subItemOf", start_date:"startDate", apc_case_num:"apcCaseNum", service_call_num:"serviceCallNum", maintenance_num:"maintenanceNum", customer_po:"customerPO", apc_sales_order:"apcSalesOrder", contract_location:"contractLocation", custom_fields:"customFields", deleted_at:"deletedAt", created_at:"createdAt" };
  const r = {};
  for (const k in obj) { r[m[k]||k] = obj[k]; }
  // Safely parse any jsonb fields that may come back as strings
  const jsonFields = ["phoneNumbers","customFields"];
  for (const f of jsonFields) {
    if (typeof r[f] === "string") {
      try { r[f] = JSON.parse(r[f]); } catch(e) { r[f] = []; }
    }
    if (!Array.isArray(r[f])) r[f] = [];
  }
  return r;
};

const ALPHABET_TABS = ["All","123","ABC","DEF","GHI","JKL","MNO","PQRS","TUV","WXYZ"];
const getAlphaGroup = name => {
  if (!name) return "All";
  const c = name[0].toUpperCase();
  if ("0123456789".includes(c)) return "123";
  if ("ABC".includes(c)) return "ABC";
  if ("DEF".includes(c)) return "DEF";
  if ("GHI".includes(c)) return "GHI";
  if ("JKL".includes(c)) return "JKL";
  if ("MNO".includes(c)) return "MNO";
  if ("PQRS".includes(c)) return "PQRS";
  if ("TUV".includes(c)) return "TUV";
  if ("WXYZ".includes(c)) return "WXYZ";
  return "All";
};

const USERS = [
  { username: "admin", password: "cesmic2024", name: "Administrator" },
  { username: "user1", password: "cesmic2024", name: "User One" },
  { username: "user2", password: "cesmic2024", name: "User Two" },
  { username: "user3", password: "cesmic2024", name: "User Three" },
];

function formatPhone(raw) {
  const digits = (raw||"").replace(/\D/g,"").slice(0,10);
  if (!digits.length) return "";
  if (digits.length <= 3) return "("+digits;
  if (digits.length <= 6) return "("+digits.slice(0,3)+") "+digits.slice(3);
  return "("+digits.slice(0,3)+") "+digits.slice(3,6)+"-"+digits.slice(6);
}

function statusBadge(s) {
  if (!s) return null;
  const cl = s.includes("Completed") ? "badge-completed" : s.includes("Cancelled") ? "badge-cancelled" : s.includes("Active") ? "badge-active" : "badge-task";
  return <span className={"badge "+cl}>{s}</span>;
}

// =====================
// MAIN APP
// =====================
function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [clients, setClients] = useState([]);
  const [loading, setLoading] = useState(false);
  const [activeNav, setActiveNav] = useState("customers");
  const [selectedClientId, setSelectedClientId] = useState(null);
  const [alphaTab, setAlphaTab] = useState("All");
  const [search, setSearch] = useState("");
  const [activeClientTab, setActiveClientTab] = useState("general");
  const [modal, setModal] = useState(null);
  const [loginForm, setLoginForm] = useState({ username:"", password:"" });
  const [loginError, setLoginError] = useState("");
  const [officeDutiesTab, setOfficeDutiesTab] = useState("tasks");

  const loadClients = useCallback(async () => {
    setLoading(true);
    try {
      const clientRows = await sb.get("clients","deleted=eq.false&order=name.asc");
      const mapped = (clientRows||[]).map(r => {
        const c = toCamel(r);
        c.phoneNumbers = c.phoneNumbers || [];
        c.jobs = [];
        c.tasks = [];
        c.equipment = [];
        c.serviceContracts = [];
        c.detailLoaded = false;
        return c;
      });
      setClients(mapped);
    } catch(e) { console.error(e); }
    setLoading(false);
  }, []);

  const loadClientDetail = useCallback(async (clientId) => {
    try {
      const [jobRows, taskRows, eqRows, scRows] = await Promise.all([
        sb.getByClient("jobs", clientId, "order=date.desc"),
        sb.getByClient("tasks", clientId, "order=date.asc"),
        sb.getByClient("equipment", clientId, "order=created_at.asc"),
        sb.getByClient("service_contracts", clientId, "order=created_at.asc"),
      ]);
      setClients(prev => prev.map(c => {
        if (c.id !== clientId) return c;
        return {
          ...c,
          jobs: (jobRows||[]).map(toCamel),
          tasks: (taskRows||[]).map(toCamel),
          equipment: (eqRows||[]).map(toCamel),
          serviceContracts: (scRows||[]).map(toCamel),
          detailLoaded: true
        };
      }));
    } catch(e) { console.error(e); }
  }, []);

  useEffect(() => { if (currentUser) loadClients(); }, [currentUser]);

  // Removed auto-refresh to prevent jobs disappearing while viewing
  // Manual refresh happens on login and after adding/editing records

  const selectedClient = clients.find(c => c.id === selectedClientId);

  const filteredClients = useMemo(() => clients.filter(c => {
    const matchAlpha = alphaTab === "All" || getAlphaGroup(c.name) === alphaTab;
    const q = search.toLowerCase();
    const matchSearch = !q || c.name.toLowerCase().includes(q) || (c.accountNumber||"").toLowerCase().includes(q) || (c.city||"").toLowerCase().includes(q);
    return matchAlpha && matchSearch;
  }), [clients, alphaTab, search]);

  const allActiveTasks = useMemo(() => clients.flatMap(c => (c.tasks||[]).filter(t => t.status==="Active Task").map(t => ({...t,clientName:c.name,clientId:c.id}))).sort((a,b)=>(a.date||"").localeCompare(b.date||"")), [clients]);
  const allActiveJobs = useMemo(() => clients.flatMap(c => (c.jobs||[]).filter(j => j.status==="Active Job").map(j => ({...j,clientName:c.name,clientId:c.id}))).sort((a,b)=>(b.date||"").localeCompare(a.date||"")), [clients]);

  // Load all tasks for office duties — jobs loaded on demand per client only
  useEffect(() => {
    if (!currentUser) return;
    const loadAllTasks = async () => {
      try {
        const taskRows = await sb.get("tasks","order=date.asc");
        const taskClientMap = {};
        (taskRows||[]).forEach(r => { const t=toCamel(r); if(!taskClientMap[t.clientId]) taskClientMap[t.clientId]=[]; taskClientMap[t.clientId].push(t); });
        setClients(prev => prev.map(c => ({
          ...c,
          tasks: taskClientMap[c.id] !== undefined ? taskClientMap[c.id] : c.tasks,
        })));
      } catch(e) { console.error(e); }
    };
    loadAllTasks();
  }, [currentUser]);
  const deletedClients = useMemo(() => [], []);

  const handleLogin = () => {
    const user = USERS.find(u => u.username===loginForm.username && u.password===loginForm.password);
    if (user) { setCurrentUser(user); setLoginError(""); }
    else setLoginError("Invalid username or password.");
  };

  // DB operations
  const saveClient = async (data) => {
    const snake = toSnake({ ...data, deleted: false });
    delete snake.jobs; delete snake.tasks; delete snake.equipment; delete snake.serviceContracts;
    delete snake.id; delete snake.created_at;
    const rows = await sb.post("clients", snake);
    await loadClients();
    return rows[0];
  };
  const updateClient = async (id, data) => {
    // Only send valid database columns
    const validFields = ["account_number","office","renewal_date","maintenance","frequency","notes","name","address","city","province","postal","primary_work_phone","billing_location","contact_name","email","phone_numbers","access"];
    const snake = toSnake({...data});
    const clean = {};
    for (const k of validFields) { if (snake[k] !== undefined) clean[k] = snake[k]; }
    await sb.patch("clients", id, clean);
    setClients(prev => prev.map(c => c.id===id ? {...c,...data} : c));
  };
  const deleteClient = async (id) => {
    await sb.patch("clients", id, { deleted: true, deleted_at: new Date().toISOString() });
    setClients(prev => prev.filter(c => c.id!==id));
    setSelectedClientId(null);
  };

  const addRecord = async (clientId, tab, data) => {
    const tableMap = { jobs:"jobs", tasks:"tasks", equipment:"equipment", serviceContracts:"service_contracts" };
    const snake = toSnake({...data, clientId});
    delete snake.id; delete snake.created_at;
    const rows = await sb.post(tableMap[tab], snake);
    const newRec = toCamel(rows[0]);
    setClients(prev => prev.map(c => c.id===clientId ? {...c,[tab]:[...c[tab],newRec]} : c));
  };
  const updateRecord = async (clientId, tab, recId, data) => {
    const tableMap = { jobs:"jobs", tasks:"tasks", equipment:"equipment", serviceContracts:"service_contracts" };
    // Build clean payload with only valid DB fields per table
    const fieldMap = {
      jobs: ["date","location","summary","team","status"],
      tasks: ["date","summary","notes","status","substatus"],
      equipment: ["item","location","status","substatus","notes","qty","warranty","manufacturer","model_number","serial_number","part_number","installed","removed","sub_item_of"],
      serviceContracts: ["summary","status","substatus","start_date","expiration","apc_case_num","service_call_num","maintenance_num","customer_po","apc_sales_order","contract_location","custom_fields"]
    };
    const snake = toSnake({...data});
    const allowed = fieldMap[tab] || [];
    const clean = {};
    for (const k of allowed) { if (snake[k] !== undefined) clean[k] = snake[k]; }
    console.log("updateRecord", tab, recId, clean);
    const result = await sb.patch(tableMap[tab], recId, clean);
    console.log("patch result", result);
    // Update state immediately with new data
    setClients(prev => prev.map(c => {
      if (c.id !== clientId) return c;
      return { ...c, [tab]: c[tab].map(r => r.id === recId ? { ...r, ...data } : r) };
    }));
  };
  const deleteRecord = async (clientId, tab, recId) => {
    const tableMap = { jobs:"jobs", tasks:"tasks", equipment:"equipment", serviceContracts:"service_contracts" };
    await sb.delete(tableMap[tab], recId);
    setClients(prev => prev.map(c => c.id===clientId ? {...c,[tab]:c[tab].filter(r=>r.id!==recId)} : c));
  };

  if (!currentUser) return (
    <div className="login-page">
      <div className="login-card">
        <h1>Cesmic</h1>
        <p>Client Service Tracker — Sign in to continue</p>
        <div className="login-field"><label>Username</label><input value={loginForm.username} onChange={e=>setLoginForm(p=>({...p,username:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="Enter username" /></div>
        <div className="login-field"><label>Password</label><input type="password" value={loginForm.password} onChange={e=>setLoginForm(p=>({...p,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="Enter password" /></div>
        <button className="login-btn" onClick={handleLogin}>Sign In</button>
        {loginError && <p className="login-error">{loginError}</p>}
      </div>
    </div>
  );

  if (loading && clients.length===0) return (
    <div className="loading-screen">
      <div className="spinner"></div>
      <p>Loading Cesmic Client Service Tracker...</p>
    </div>
  );

  return (

        </nav>
        <div className="sidebar-user">

        </div>

      <div className="main">
        {activeNav==="customers" && !selectedClientId && (

              <input className="search-box" placeholder="Search by name, account, city..." value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
            <div className="content">
              <div className="alpha-tabs">{ALPHABET_TABS.map(t=><button key={t} className={`alpha-tab ${alphaTab===t?"active":""}`} onClick={()=>setAlphaTab(t)}>{t}</button>)}</div>

                    {filteredClients.length===0 && <tr><td colSpan={11} style={{textAlign:"center",padding:"30px",color:"#999"}}>{loading?"Loading...":"No clients found"}</td></tr>}

                        <td>{c.accountNumber}</td><td>{c.office}</td><td>{c.renewalDate}</td><td>{c.maintenance}</td><td>{c.frequency}</td>

function GeneralTab({ client, onUpdate }) {
  const safeClient = {...client, phoneNumbers: Array.isArray(client.phoneNumbers) ? client.phoneNumbers : (typeof client.phoneNumbers === "string" ? (() => { try { return JSON.parse(client.phoneNumbers); } catch(e) { return []; } })() : []) };
  const [form, setForm] = useState(safeClient);
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const setPhone = (i,k,v) => {
    const phones = [...form.phoneNumbers];
    const val = k==="raw" ? formatPhone(v) : v;
    phones[i] = {...phones[i],[k]:val};
    const updated = {...form, phoneNumbers:phones};
    updated.primaryWorkPhone = phones[0]?.raw || "";
    setForm(updated);
  };
  const save = async () => { setSaving(true); await onUpdate(form); setSaving(false); setSaved(true); setTimeout(()=>setSaved(false),2000); };
  return (
    <div>
      <div className="form-section"><h3>Site Information</h3>
        <div className="form-grid">
          <div className="form-group"><label>Account Number</label><input value={form.accountNumber||""} onChange={e=>set("accountNumber",e.target.value)} /></div>
          <div className="form-group"><label>Office</label><select value={form.office||"Ontario"} onChange={e=>set("office",e.target.value)}><option>Ontario</option><option>Quebec</option></select></div>
          <div className="form-group full-width"><label>Company / Site Name</label><input value={form.name||""} onChange={e=>set("name",e.target.value)} /></div>
          <div className="form-group full-width"><label>Address</label><input value={form.address||""} onChange={e=>set("address",e.target.value)} /></div>
          <div className="form-group"><label>City</label><input value={form.city||""} onChange={e=>set("city",e.target.value)} /></div>
          <div className="form-group"><label>Province</label><input value={form.province||""} onChange={e=>set("province",e.target.value)} /></div>
          <div className="form-group"><label>Postal Code</label><input value={form.postal||""} onChange={e=>set("postal",e.target.value)} /></div>
          <div className="form-group full-width"><label>Access</label><input value={form.access||""} onChange={e=>set("access",e.target.value)} /></div>
        </div>
      </div>
      <div className="form-section"><h3>Contact Information</h3>
        <div className="form-grid">
          <div className="form-group"><label>Contact Name</label><input value={form.contactName||""} onChange={e=>set("contactName",e.target.value)} /></div>
          <div className="form-group"><label>Email</label><input value={form.email||""} onChange={e=>set("email",e.target.value)} /></div>
          <div className="form-group full-width"><label>Phone Numbers</label>
            {(form.phoneNumbers||[]).map((p,i)=>(
              <div key={i} className="phone-row">
                <select value={p.type||"Work"} onChange={e=>setPhone(i,"type",e.target.value)}><option>Work</option><option>Mobile</option><option>Fax</option><option>Other</option></select>
                <input value={p.raw||(p.area&&p.number?"("+p.area+") "+p.number:"")||""} onChange={e=>setPhone(i,"raw",e.target.value)} placeholder="(416) 555-1234" style={{flex:1}} />
                {i>0 && <button className="btn btn-secondary btn-sm" onClick={()=>setForm(p2=>({...p2,phoneNumbers:p2.phoneNumbers.filter((_,j)=>j!==i)}))}>✕</button>}
              </div>
            ))}
            <button className="btn btn-secondary btn-sm" onClick={()=>setForm(p=>({...p,phoneNumbers:[...(p.phoneNumbers||[]),{type:"Work",raw:""}]}))}>+ Add Phone</button>
          </div>
        </div>
      </div>
      <div className="form-section"><h3>List View Fields</h3>
        <div className="form-grid">
          <div className="form-group"><label>Renewal Date</label><input value={form.renewalDate||""} onChange={e=>set("renewalDate",e.target.value)} /></div>
          <div className="form-group"><label>Maintenance</label><select value={form.maintenance||"NO"} onChange={e=>set("maintenance",e.target.value)}><option>A/C Only</option><option>Fire Detection</option><option>Generator</option><option>Multiple</option><option>NO</option><option>PDU Maint</option><option>Room Cleaning</option><option>Thermoscan</option><option>UPS/APC</option></select></div>
          <div className="form-group"><label>Frequency</label><select value={form.frequency||""} onChange={e=>set("frequency",e.target.value)}><option value="">— Select —</option><option>Annual</option><option>Bi-Annual</option><option>Bi-Monthly</option><option>Monthly</option><option>Multiple</option><option>Quarterly</option></select></div>
          <div className="form-group"><label>Billing Location</label><input value={form.billingLocation||""} onChange={e=>set("billingLocation",e.target.value)} /></div>
          <div className="form-group full-width"><label>Notes</label><textarea rows={3} value={form.notes||""} onChange={e=>set("notes",e.target.value)} style={{resize:"vertical"}} /></div>
        </div>
      </div>
      <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?"Saving...":saved?"✓ Saved":"Save Changes"}</button>
    </div>
  );
}

function ReportsPage({ clients }) {
  const today = new Date();
  const in90 = new Date(today); in90.setDate(today.getDate()+90);
  const in30 = new Date(today); in30.setDate(today.getDate()+30);
  const expiringContracts = clients.flatMap(c=>(c.serviceContracts||[]).filter(s=>s.expiration&&new Date(s.expiration)<=in90&&new Date(s.expiration)>=today).map(s=>({...s,clientName:c.name}))).sort((a,b)=>a.expiration.localeCompare(b.expiration));
  const expiringWarranties = clients.flatMap(c=>(c.equipment||[]).filter(e=>e.warranty&&new Date(e.warranty)<=in90&&new Date(e.warranty)>=today).map(e=>({...e,clientName:c.name}))).sort((a,b)=>a.warranty.localeCompare(b.warranty));
  const tasksDue = clients.flatMap(c=>(c.tasks||[]).filter(t=>t.date&&new Date(t.date)<=in30&&t.status==="Active Task").map(t=>({...t,clientName:c.name}))).sort((a,b)=>a.date.localeCompare(b.date));
  const th={textAlign:"left",padding:"4px 0",color:"#666",fontSize:"12px"};

function addMonths(dateStr, months) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0,10);
}

function generateDates(startDate, frequency, occurrences) {
  const monthMap = { "Monthly": 1, "Semi-Annually": 6, "Annually": 12 };
  const months = monthMap[frequency] || 0;
  const dates = [];
  for (let i = 0; i < occurrences; i++) {
    dates.push(addMonths(startDate, i * months));
  }
  return dates;
}

              <div className="form-group full-width"><label>Summary</label><input value={form.summary} onChange={e=>set("summary",e.target.value)} placeholder="Contract description and equipment references" /></div>
              <div className="form-group"><label>Status</label><select value={form.status} onChange={e=>set("status",e.target.value)}><option>Active</option><option>Completed</option><option>Cancelled</option></select></div>
              <div className="form-group"><label>Substatus</label><input value={form.substatus} onChange={e=>set("substatus",e.target.value)} placeholder="e.g. Fulfilled" /></div>
              <div className="form-group"><label>Start Date</label><input type="date" value={form.startDate} onChange={e=>set("startDate",e.target.value)} /></div>
              <div className="form-group"><label>Expiration Date</label><input type="date" value={form.expiration} onChange={e=>set("expiration",e.target.value)} /></div>
            </div>
          )}
          {activeTab==="customFields" && (
            <div className="form-grid">
              <div className="form-group"><label>APC Case #</label><input value={form.apcCaseNum} onChange={e=>set("apcCaseNum",e.target.value)} /></div>
              <div className="form-group"><label>Service Call #</label><input value={form.serviceCallNum} onChange={e=>set("serviceCallNum",e.target.value)} /></div>
              <div className="form-group"><label>Maintenance #</label><input value={form.maintenanceNum} onChange={e=>set("maintenanceNum",e.target.value)} /></div>
              <div className="form-group"><label>Customer PO#</label><input value={form.customerPO} onChange={e=>set("customerPO",e.target.value)} /></div>
              <div className="form-group"><label>APC Sales Order#</label><input value={form.apcSalesOrder} onChange={e=>set("apcSalesOrder",e.target.value)} /></div>
              <div className="form-group"><label>Location</label><input value={form.contractLocation} onChange={e=>set("contractLocation",e.target.value)} /></div>
            </div>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={saving} onClick={async()=>{setSaving(true);await onSave(form);setSaving(false);}}>{saving?"Saving...":"Save"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
